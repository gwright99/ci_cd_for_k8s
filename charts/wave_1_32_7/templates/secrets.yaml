---
apiVersion: v1
kind: Secret
metadata:
  namespace: {{.Values.wave.app.namespace | quote}}
  name: {{.Values.wave.app.sa_name | quote}}
  annotations:
    kubernetes.io/service-account.name: {{.Values.wave.app.sa_name | quote}}
type: kubernetes.io/service-account-token
---
# Secrets for values that should not live in the ConfigMap.
# Micronaut resolves env vars using the UPPERCASE_UNDERSCORE convention,
# so these override the equivalent YAML config paths (e.g. wave.db.user -> WAVE_DB_USER).
apiVersion: v1
kind: Secret
metadata:
  name: "wave-secrets"
  namespace: {{.Values.wave.app.namespace | quote}}
type: Opaque
stringData:
  WAVE_DB_USER: {{.Values.config.db.user | quote}}
  WAVE_DB_PASSWORD: {{.Values.config.db.password | quote}}
{{- if not .Values.config.mail.use_ses_iam_role }}
  MAIL_SMTP_USER: {{.Values.config.mail.smtp.user | quote}}
  MAIL_SMTP_PASSWORD: {{.Values.config.mail.smtp.password | quote}}
{{- end }}
