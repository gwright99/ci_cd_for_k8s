---
kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Release.Name }}-tower-backend-cfg
  labels:
    app: {{ .Release.Name }}-backend-cfg
data:
  TOWER_SERVER_URL:        {{ .Values.config.TOWER_SERVER_URL | quote }}
  TOWER_CONTACT_EMAIL:     {{ .Values.config.TOWER_CONTACT_EMAIL | quote }}
  TOWER_JWT_SECRET:        {{ .Values.config.TOWER_JWT_SECRET | quote }}
  TOWER_CRYPTO_SECRETKEY:  {{ .Values.config.TOWER_CRYPTO_SECRETKEY | quote }}
  TOWER_LICENSE:           {{ .Values.config.TOWER_LICENSE | quote }}
  TOWER_ENABLE_PLATFORMS:  "awsbatch-platform,slurm-platform,eks-platform,awscloud-platform"

  TOWER_DB_URL: {{ .Values.config.TOWER_DB_URL | quote }}
  TOWER_DB_DRIVER: "org.mariadb.jdbc.Driver"
  TOWER_DB_USER: "tower"
  TOWER_DB_PASSWORD: {{ .Values.config.TOWER_DB_PASSWORD | quote }}
  TOWER_DB_DIALECT: "io.seqera.util.MySQL55DialectCollateBin"
  TOWER_DB_MIN_POOL_SIZE: "2"
  TOWER_DB_MAX_POOL_SIZE: "10"
  TOWER_DB_MAX_LIFETIME: "180000"
  FLYWAY_LOCATIONS: "classpath:db-schema/mysql"

  TOWER_ENABLE_AWS_SES: "true"
  TOWER_SMTP_HOST:      {{ .Values.config.TOWER_SMTP_HOST | quote }}
  TOWER_SMTP_PORT:      {{ .Values.config.TOWER_SMTP_PORT | quote }}
  TOWER_SMTP_USER:      {{ .Values.config.TOWER_SMTP_USER | quote }}
  TOWER_SMTP_PASSWORD:  {{ .Values.config.TOWER_SMTP_PASSWORD | quote }}

  TOWER_ENABLE_WAVE:  {{ .Values.config.TOWER_ENABLE_WAVE | quote }}
  WAVE_SERVER_URL:  {{ .Values.config.WAVE_SERVER_URL | quote }}

  TOWER_REDIS_URL: {{ .Values.config.TOWER_REDIS_URL | quote }}

  TOWER_LOG_LEVEL: {{ .Values.config.TOWER_LOG_LEVEL | quote}}
  TOWER_ROOT_USERS: {{ .Values.config.TOWER_ROOT_USERS | quote}}

  TOWER_OIDC_CLIENT: {{ .Values.config.TOWER_OIDC_CLIENT | quote }}
  TOWER_OIDC_SECRET: {{ .Values.config.TOWER_OIDC_SECRET | quote}}
  TOWER_OIDC_ISSUER: {{ .Values.config.TOWER_OIDC_ISSUER | quote }}

  # Data studio stuff
  TOWER_DATA_STUDIO_CONNECT_URL: {{ .Values.config.TOWER_DATA_STUDIO_CONNECT_URL | quote }}

  TOWER_OIDC_PEM_PATH: {{ .Values.config.TOWER_OIDC_PEM_PATH | quote }}
  TOWER_OIDC_REGISTRATION_INITIAL_ACCESS_TOKEN: {{ .Values.config.TOWER_OIDC_REGISTRATION_INITIAL_ACCESS_TOKEN | quote }}

  TOWER_DATA_STUDIO_TEMPLATES_VSCODE_1_101_2_0_9_0_ICON: {{ .Values.config.TOWER_DATA_STUDIO_TEMPLATES_VSCODE_1_101_2_0_9_0_ICON | quote }}
  TOWER_DATA_STUDIO_TEMPLATES_VSCODE_1_101_2_0_9_0_REPOSITORY: {{ .Values.config.TOWER_DATA_STUDIO_TEMPLATES_VSCODE_1_101_2_0_9_0_REPOSITORY | quote }}
  TOWER_DATA_STUDIO_TEMPLATES_VSCODE_1_101_2_0_9_0_TOOL: {{ .Values.config.TOWER_DATA_STUDIO_TEMPLATES_VSCODE_1_101_2_0_9_0_TOOL | quote }}
  TOWER_DATA_STUDIO_TEMPLATES_VSCODE_1_101_2_0_9_0_STATUS: {{ .Values.config.TOWER_DATA_STUDIO_TEMPLATES_VSCODE_1_101_2_0_9_0_STATUS | quote }}

  TOWER_DATA_STUDIO_CONNECT_SSH_ADDRESS: {{ .Values.config.TOWER_DATA_STUDIO_CONNECT_SSH_ADDRESS }}
  TOWER_DATA_STUDIO_CONNECT_SSH_PORT: {{ .Values.config.TOWER_DATA_STUDIO_CONNECT_SSH_PORT | quote }}
  TOWER_DATA_STUDIO_SSH_ALLOWED_WORKSPACES: {{ .Values.config.TOWER_DATA_STUDIO_SSH_ALLOWED_WORKSPACES | quote }}
  TOWER_SSH_KEYS_MANAGEMENT_ENABLED: {{ .Values.config.TOWER_SSH_KEYS_MANAGEMENT_ENABLED | quote }}  # IF this is missing, no option in profile dropdown

  # https://stackoverflow.com/questions/66678097/does-javax-net-ssl-truststore-override-or-add-to-cacerts
  # JAVA_OPTS: "-Djdk.tls.client.protocols=TLSv1.2 -Djavax.net.debug=all -Djavax.net.ssl.trustStore=/usr/lib/jvm/java-17-amazon-corretto/lib/security/cacerts"
  # TLS details
  # JAVA_OPTS: "-Djdk.tls.client.protocols=TLSv1.2 -Djavax.net.debug=all"
  # SCM test
  #TOWER_SCM_PROVIDERS_GITLAB_USER: "abc"
  #TOWER_SCM_PROVIDERS_GITLAB_PASSWORD: "123"
