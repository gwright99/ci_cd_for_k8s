apiVersion: apps/v1
kind: Deployment
metadata:
  name: connect-proxy
  labels:
    app.kubernetes.io/component: connect-proxy
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: connect-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/component: connect-proxy
    spec:
      imagePullSecrets:
        - name: {{ .Values.images.imagepullsecret | quote }}
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: proxy
          {{- with .Values.images.connectproxy.main }}
          image: {{ printf "%s:%s" .image .tag | quote }}
          {{- end }}
          # command: ["caddy", "serve"]  # Removed
          env:
            # IMO this is confusing. These should be pushed to the ConfigMap and centralized.
            - name: PLATFORM_URL
              value: "{{ .Values.config.TOWER_SERVER_URL }}"
            - name: CONNECT_HTTP_PORT
              value: "{{ .Values.config.CONNECT_HTTP_PORT }}"
            - name: CONNECT_REDIS_ADDRESS
              value: {{ .Values.config.TOWER_REDIS_URL | trimPrefix "redis://" | quote }}
            - name: CONNECT_REDIS_PREFIX
              value: "connect:session"
            - name: CONNECT_REDIS_TLS_ENABLE
              value: "{{ .Values.config.CONNECT_REDIS_TLS_ENABLE }}"
            - name: CONNECT_REDIS_DB
              value: "{{ .Values.config.CONNECT_REDIS_DB }}"
            - name: CONNECT_PROXY_URL
              # Claude says these number types or ok to be wrapped in quotes. I'm not convinced (but auto-formatter
              # is messing up spacing if I dont wrap in doublequotes).
              value: "{{ .Values.config.TOWER_DATA_STUDIO_CONNECT_URL }}"
            - name: CONNECT_TUNNEL_URL
              value: "{{ .Values.config.CONNECT_TUNNEL_URL }}"
            - name: CONNECT_OIDC_CLIENT_REGISTRATION_TOKEN
              value: "{{ .Values.config.TOWER_OIDC_REGISTRATION_INITIAL_ACCESS_TOKEN }}"
            - name: LOCAL_CACHE_TTL
              value: "2m"
            # Extra stuff Sushma has https://github.com/seqeralabs/connect/blob/master/docs/features/ssh.md?plain=1
            - name: CONNECT_SSH_ENABLED
              value: "true"
            - name: CONNECT_SSH_ADDR
              value: ":2222"
            # - name: CONNECT_SSH_KEY_PATH  -- I dont set fingerprint
            #   value: "/secrets/ssh-key"
          # nEW MANIFEST HAS securityContext stuff
          ports:
            - containerPort: {{ .Values.config.CONNECT_HTTP_PORT }}  #80
              name: proxy
---
apiVersion: v1
kind: Service
metadata:
  name: connect-proxy
  labels:
    app.kubernetes.io/component: connect-proxy
spec:
  type: NodePort
  ports:
    - port: 80
      name: connect-proxy
      targetPort: proxy
  selector:
    app.kubernetes.io/component: connect-proxy
---
# NLB uses "IP target type", so flow is: NLB → Pod IP (10.1.103.55) directly via VPC routing
# Access controlled by Node's security group (port 2222) -- added to cx-solo via ssh phase.
apiVersion: v1
kind: Service
metadata:
  name: connect-proxy-ssh
  labels:
    app.kubernetes.io/component: connect-proxy
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    external-dns.alpha.kubernetes.io/hostname: "connect-ssh.gw.cxpg.dev-seqera.net"
spec:
  type: LoadBalancer
  ports:
    - name: ssh
      port: 2222
      targetPort: 2222
      protocol: TCP
  selector:
    app.kubernetes.io/component: connect-proxy
