{{- if eq (.Values.ingress.enable) true }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    # Purged many annotation since these are set on the main ingress during cluster stand-up (TF EKS)
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.CERT_ARN }}
    alb.ingress.kubernetes.io/group.name: cluster-alb
    alb.ingress.kubernetes.io/group.order: "39"  # sushma uses 40
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/tags: CreatedBy=Graham, Environment=development
    alb.ingress.kubernetes.io/actions.response-404: >
          {"type":"fixed-response","fixedResponseConfig":{"contentType":"text/plain","statusCode":"404","messageBody":"404 Not found"}}
  name: {{ .Release.Name }}
spec:
  ingressClassName: alb
  rules:
    - host: {{ .Values.ingress.HOST_URL | quote }}
      http:
        paths:
          - backend:
              service:
                name: {{ .Release.Name }}-frontend
                port:
                  number: 80 # Problem with unprivileged?
            path: /*
            pathType: ImplementationSpecific
          - backend:
              service:
                name: {{ .Release.Name }}-backend-api
                port:
                  number: 8080
            path: /api
            pathType: ImplementationSpecific

    # Data Studio (flat)
    - host: {{ .Values.ingress.CONNECT_URL | quote }}
      http:
        paths:
          - backend:
              service:
                name: connect-proxy
                port:
                  number: 80
            pathType: ImplementationSpecific
            path: /*
            
{{- else if eq (.Values.gateway.enable) true }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.gateway.HOST_URL | quote }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - {{ .Values.gateway.HOST_URL | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ .Release.Name }}-backend-api
          port: 8080
    - backendRefs:
        - name: {{ .Release.Name }}-frontend
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-connect
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.gateway.CONNECT_URL | quote }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - {{ .Values.gateway.CONNECT_URL | quote }}
  rules:
    - backendRefs:
        - name: connect-proxy
          port: 80
{{- end }}