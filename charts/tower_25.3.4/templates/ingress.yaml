---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    # Purged many annotation since these are set on the main ingress during cluster stand-up (TF EKS)
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.CERT_ARN }}
    alb.ingress.kubernetes.io/group.name: cluster-alb
    alb.ingress.kubernetes.io/group.order: "39"  # sushma uses 40
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/tags: CreatedBy=Graham, Environment=development
    alb.ingress.kubernetes.io/actions.response-404: >
          {"type":"fixed-response","fixedResponseConfig":{"contentType":"text/plain","statusCode":"404","messageBody":"404 Not found"}}
  name: {{ .Release.Name }}
spec:
  ingressClassName: alb
  rules:
    - host: {{ .Values.ingress.HOST_URL }}
      http:
        paths:
          - backend:
              service:
                name: {{ .Release.Name }}-frontend
                port:
                  number: 80 # Problem with unprivileged?
            path: /*
            pathType: ImplementationSpecific
          - backend:
              service:
                name: {{ .Release.Name }}-backend-api
                port:
                  number: 8080
            path: /api
            pathType: ImplementationSpecific

    # Data Studio (flat)
    - host: "{{ .Values.ingress.CONNECT_URL }}"
      http:
        paths:
          - backend:
              service:
                name: connect-proxy
                port:
                  number: 80
            pathType: ImplementationSpecific
            path: /*